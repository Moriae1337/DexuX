name: Release Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'github-actions[bot]' && startsWith(github.event.pull_request.head.ref, 'release-please-')
    steps:
      - name: Approve Release PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Merge Release PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.AUTO_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
